{% extends "base.html" %}
{% block title %}Virtual Office — CSC{% endblock %}
{% block content %}

<div class="vo-layout">

  <!-- ── CHAT SCROLL AREA (everything above the composer scrolls inside this
       fixed-height pane, like a normal AI chat window -- the page itself
       never scrolls) ──────────────────────────────────────────────────── -->
  <div id="chat-scroll" class="chat-scroll">

    <section class="vo-input">
      <h1>Virtual Office</h1>
      <p class="subtitle">แปะโพสต์ บทสนทนา หรือ Feedback จาก Facebook — ทีม AI จะวิเคราะห์ วางแผนคอนเทนต์ ร่างข้อความ และแบ่งงานให้ทันที</p>
    </section>

    <!-- ── HISTORY THREAD (grows downward like a chat -- hydrated from
         /runs/recent on load, then live SSE results get appended so a
         refresh never loses it) ──────────────────────────────────────── -->
    <div id="history-area" class="history-area"></div>

    <!-- ── PROGRESS (during streaming: thinking cloud + agent typing bubbles
         + handoff), placed right after the thread so it reads like a
         "typing…" indicator at the bottom of the conversation ─────────── -->
    <div id="progress-area" class="progress-area" hidden>
      <div id="thinking-cloud" class="thinking-cloud" hidden>
        <span class="thinking-cloud__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>
        </span>
        <span id="thinking-cloud__text">กำลังคิด...</span>
        <span class="thinking-dots"><i></i><i></i><i></i></span>
      </div>
      <div class="progress-bar-wrap"><div id="progress-bar" class="progress-bar"></div></div>
      <div id="progress-agents" class="progress-agents"></div>
    </div>

    <!-- ── LEGACY RESULT MOUNT (kept for the very first paint before JS hydrates) -->
    <div id="result-area"></div>
    <div id="static-result" class="hidden"></div>


  </div>

  <!-- ── COMPOSER (pinned to the bottom of the viewport, like a normal AI
       chat app -- never gets pushed down by a growing history) ───────── -->
  <section class="vo-composer">
    <div id="attachment-previews" class="attachment-previews" hidden></div>
    <form id="office-form" class="input-form">
      <input type="hidden" id="conversation-id-input" value="{{ conversation_id }}" />
      <button type="button" id="attach-btn" class="btn-attach" title="แนบรูปภาพ">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <input type="file" id="image-input" accept="image/png,image/jpeg,image/webp,image/gif" multiple hidden />
      <textarea id="raw-text-input" name="raw_text" rows="1"
        placeholder="เช่น: คอมเมนต์จาก Facebook กลุ่ม / บทสนทนากับลีด / Feedback จากร้าน / หรือถามอะไรก็ได้..."
        >{{ latest_run.raw_text if latest_run else '' }}</textarea>
      <button type="submit" class="btn btn--primary btn--submit" id="submit-btn">
        <span class="btn-text">วิเคราะห์</span>
        <span class="btn-spinner" hidden>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
        </span>
      </button>
    </form>
  </section>

</div>
{% endblock %}
